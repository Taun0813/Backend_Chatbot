spring:
  data:
    redis:
      host: redis
      port: 6379

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: rabbitmq_password
    virtual-host: /

  datasource:
    url: jdbc:postgresql://postgresql:5432/ai-agent
    username: ai-agent
    password: 123

eureka:
  instance:
    hostname: discovery-service
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
